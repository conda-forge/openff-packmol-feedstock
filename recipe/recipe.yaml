context:
  name: openff-packmol
  version: "0.1"
  python_min: "3.11"

recipe:
  name: ${{ name }}
  version: ${{ version }}

source:
  url: https://github.com/openforcefield/${{ name }}/archive/refs/tags/${{ version }}.tar.gz
  sha256: 69e33df25ff4266a83dbb06de4dea6c8199e2e6e903823762ed77d85395bc53e

build:
  noarch: python
  script: SETUPTOOLS_SCM_PRETEND_VERSION="$PKG_VERSION" ${PYTHON} -m pip install . -vv --no-deps
  number: 1

outputs:
  - package:
      name: openff-packmol
      version: ${{ version }}
    build:
      noarch: python
      script: SETUPTOOLS_SCM_PRETEND_VERSION="$PKG_VERSION" ${PYTHON} -m pip install . -vv --no-deps
      number: 1

    requirements:
      host:
        - python ${{ python_min }}.*
        - pip
        - setuptools
        - setuptools_scm
      run:
        - python >=${{ python_min }}
        - numpy
        - scipy
        - packaging
        - openff-toolkit-base >=0.18  # note to self: could probably drop down to 0.17.x if needed

    tests:
      - python:
          python_version:
            - ${{ python_min }}.*
            - "*"
          imports:
            - openff.packmol
            - openff.toolkit
          pip_check: true
      - script:
          - python test_version.py
          - python test_pack.py
        requirements:
          run:
            - ambertools
            - rdkit
            - packaging
        files:
          recipe:
            - test_version.py
            - test_pack.py

  - package:
      name: openff-packmol
      version: ${{ version }}
    build:
      noarch: python
      script: SETUPTOOLS_SCM_PRETEND_VERSION="$PKG_VERSION" ${PYTHON} -m pip install . -vv --no-deps
      number: 1

    requirements:
      host:
        - python ${{ python_min }}.*
        - pip
        - setuptools
        - setuptools_scm
      run:
        - python >=${{ python_min }}
        - packmol
        - ${{ pin_subpackage('libtest', upper_bound='x.x') }}

    tests:
      - python:
          python_version:
            - ${{ python_min }}.*
            - "*"
          imports:
            - openff.packmol
            - openff.toolkit
          pip_check: true
      - script:
          - python test_version.py
          - python test_pack.py
        files:
          recipe:
            - test_version.py
            - test_pack.py
about:
  homepage: https://github.com/openforcefield/openff-packmol
  summary: 'A Packmol wrapper using OpenFF objects'
  description: 'A Packmol wrapper using OpenFF objects'
  license: MIT
  license_file: LICENSE
  repository: https://github.com/openforcefield/openff-packmol

extra:
  recipe-maintainers:
    - j-wags
    - mattwthompson
